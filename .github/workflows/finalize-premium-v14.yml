name: Finalize premium v14

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-premium-v14.yml'
      - 'premium-v14/**'

concurrency:
  group: premium-v14-finalize
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build and validate production site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p premium-v14/assets
          python -m pip install --quiet pillow
          curl -L --fail --retry 3 --connect-timeout 20 'https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=3000&q=96' -o premium-v14/assets/glass-source.jpg
          python premium-v14/tools/build_glass_assets.py
          curl -L --fail --retry 3 --connect-timeout 15 'https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=1400&q=88' -o premium-v14/assets/specialist.jpg
          rm -f premium-v14/assets/specialist.webp
          sed -i 's/assets\/specialist\.webp/assets\/specialist.jpg/g' premium-v14/index.html
          sed -i 's/ target="_blank" rel="noopener"//g' premium-v14/index.html
          sed -i 's#styles.css?v=[^"]*#styles.css?v=20260714-11#g' premium-v14/index.html
          sed -i 's#app.js?v=[^"]*#app.js?v=20260714-11#g' premium-v14/index.html
          sed -i 's/src="assets\/glass-before.webp" width="960" height="720"/src="assets\/glass-before.webp" width="2400" height="1500"/g' premium-v14/index.html
          sed -i 's/src="assets\/glass-after.webp" width="960" height="720"/src="assets\/glass-after.webp" width="2400" height="1500"/g' premium-v14/index.html
          sed -i 's#class="macro-before-image" src="assets/glass-before.webp" width="960" height="720"#class="macro-before-image" src="assets/glass-before-detail.webp" width="1200" height="900"#g' premium-v14/index.html
          sed -i 's#class="macro-after-image" src="assets/glass-after.webp" width="960" height="720"#class="macro-after-image" src="assets/glass-after-detail.webp" width="1200" height="900"#g' premium-v14/index.html
          sed -i 's/Скопировать расчёт и открыть Telegram/Открыть Telegram и отправить фото/g' premium-v14/index.html
          cat premium-v14/css1.css premium-v14/css2.css premium-v14/css3.css premium-v14/css4.css premium-v14/css5.css > premium-v14/styles.css
          node --check premium-v14/app.js
          test -s premium-v14/index.html
          test -s premium-v14/styles.css
          test -s premium-v14/assets/glass-before.webp
          test -s premium-v14/assets/glass-after.webp
          test -s premium-v14/assets/glass-before-detail.webp
          test -s premium-v14/assets/glass-after-detail.webp
          file premium-v14/assets/glass-before.webp | grep -qi webp
          file premium-v14/assets/glass-after.webp | grep -qi webp
          python - <<'PY'
          from html.parser import HTMLParser
          from PIL import Image, ImageChops, ImageStat

          before=Image.open('premium-v14/assets/glass-before.webp').convert('RGB')
          after=Image.open('premium-v14/assets/glass-after.webp').convert('RGB')
          assert before.size == after.size == (2400,1500), (before.size,after.size)
          diff=sum(ImageStat.Stat(ImageChops.difference(before,after)).mean)/3
          assert 1.4 < diff < 18, diff

          class Parser(HTMLParser):
              def __init__(self): super().__init__(); self.telegram=[]; self.bad=[]
              def handle_starttag(self,tag,attrs):
                  if tag!='a': return
                  d=dict(attrs); href=d.get('href','')
                  if 't.me/' in href:
                      self.telegram.append(href)
                      if 'target' in d: self.bad.append(d)
          p=Parser(); p.feed(open('premium-v14/index.html',encoding='utf-8').read())
          assert len(p.telegram)>=7,p.telegram
          assert all(x=='https://t.me/zhukov_boss' for x in p.telegram),p.telegram
          assert not p.bad,p.bad
          app=open('premium-v14/app.js',encoding='utf-8').read()
          assert "https://t.me/zhukov_boss" in app
          css=open('premium-v14/styles.css',encoding='utf-8').read()
          assert 'images.unsplash.com/photo-1497366811353' not in css
          print('validation ok',before.size,round(diff,3),len(p.telegram))
          PY
      - name: Commit finalized site
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add premium-v14
          git diff --cached --quiet || git commit -m 'Finalize premium v14 production site'
          git push
