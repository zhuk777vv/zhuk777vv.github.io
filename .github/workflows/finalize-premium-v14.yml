name: Finalize premium v14

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-premium-v14.yml'
      - 'premium-v14/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/finalize-premium-v14.yml'
      - 'premium-v14/**'

concurrency:
  group: premium-v14-finalize-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build production assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p premium-v14/assets
          python -m pip install --quiet pillow
          SOURCE='premium-v14/assets/glass-source.webp'
          URL1='https://unsplash.com/photos/yAsddhTq1aY/download?force=true'
          URL2='https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=2800&q=95'
          curl -L --fail --retry 3 --connect-timeout 20 "$URL1" -o "$SOURCE" || true
          if ! python - <<'PY'
          from PIL import Image
          try:
              im=Image.open('premium-v14/assets/glass-source.webp')
              im.verify()
              assert im.width >= 1600 and im.height >= 900, im.size
          except Exception as exc:
              raise SystemExit(1) from exc
          PY
          then
            curl -L --fail --retry 3 --connect-timeout 20 "$URL2" -o "$SOURCE"
          fi
          python premium-v14/tools/build_glass_assets.py
          curl -L --fail --retry 3 --connect-timeout 15 'https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=1400&q=88' -o premium-v14/assets/specialist.jpg
          rm -f premium-v14/assets/specialist.webp
          sed -i 's/assets\/specialist\.webp/assets\/specialist.jpg/g' premium-v14/index.html
          sed -i 's/ target="_blank" rel="noopener"//g' premium-v14/index.html
          sed -E -i 's/styles\.css\?v=[^"]+/styles.css?v=20260714-11/' premium-v14/index.html
          sed -E -i 's/app\.js\?v=[^"]+/app.js?v=20260714-11/' premium-v14/index.html
          cat premium-v14/css1.css premium-v14/css2.css premium-v14/css3.css premium-v14/css4.css premium-v14/css5.css > premium-v14/styles.css
          cat > premium-v14/assets/favicon.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="#0b1015"/><path d="M17 13h13v38H17z" fill="#f2eee7"/><path d="M34 13h13v38H34z" fill="#9d744c"/><path d="M30 13h4v38h-4z" fill="#fff" opacity=".88"/></svg>
          SVG
          cat > premium-v14/robots.txt <<'TXT'
          User-agent: *
          Allow: /
          Sitemap: https://zhuk777vv.github.io/premium-v14/sitemap.xml
          TXT
          cat > premium-v14/sitemap.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"><url><loc>https://zhuk777vv.github.io/premium-v14/</loc><lastmod>2026-07-14</lastmod><changefreq>weekly</changefreq><priority>1.0</priority></url></urlset>
          XML
          node --check premium-v14/app.js
          test -s premium-v14/index.html
          test -s premium-v14/styles.css
          test -s premium-v14/assets/glass-before.webp
          test -s premium-v14/assets/glass-after.webp
          test -s premium-v14/assets/glass-before-detail.webp
          test -s premium-v14/assets/glass-after-detail.webp
          test -s premium-v14/assets/specialist.jpg
          file premium-v14/assets/glass-before.webp | grep -qi webp
          file premium-v14/assets/glass-after.webp | grep -qi webp
          python - <<'PY'
          from html.parser import HTMLParser
          from PIL import Image, ImageChops, ImageStat

          before = Image.open('premium-v14/assets/glass-before.webp').convert('RGB')
          after = Image.open('premium-v14/assets/glass-after.webp').convert('RGB')
          before_detail = Image.open('premium-v14/assets/glass-before-detail.webp')
          after_detail = Image.open('premium-v14/assets/glass-after-detail.webp')
          assert before.size == after.size == (2400, 1500), (before.size, after.size)
          assert before_detail.size == after_detail.size == (1200, 900), (before_detail.size, after_detail.size)
          mean_diff = sum(ImageStat.Stat(ImageChops.difference(before, after)).mean) / 3
          assert mean_diff > 0.65, mean_diff
          assert ImageChops.difference(before, after).getbbox() is not None

          class Links(HTMLParser):
              def __init__(self):
                  super().__init__(); self.telegram=[]
              def handle_starttag(self, tag, attrs):
                  if tag != 'a': return
                  href = dict(attrs).get('href', '')
                  if 't.me/' in href: self.telegram.append(href)
          parser = Links(); parser.feed(open('premium-v14/index.html', encoding='utf-8').read())
          assert len(parser.telegram) >= 7, parser.telegram
          assert all(href == 'https://t.me/zhukov_boss' for href in parser.telegram), parser.telegram
          app = open('premium-v14/app.js', encoding='utf-8').read()
          css = open('premium-v14/styles.css', encoding='utf-8').read()
          assert 'https://t.me/zhukov_boss' in app
          assert 'Manrope' not in app
          assert '.loss-hud' in css and 'font-family:Inter' in css
          print('production validation ok', before.size, before_detail.size, round(mean_diff, 3), len(parser.telegram))
          PY
      - name: Commit finalized site
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add premium-v14
          git diff --cached --quiet || git commit -m 'Finalize premium v14 production site'
          git push
