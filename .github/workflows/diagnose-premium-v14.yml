name: Diagnose premium v14

on:
  pull_request:
    branches: [main]
    paths:
      - 'premium-v14/**'
      - '.audit-v14-trigger'
      - '.github/workflows/diagnose-premium-v14.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - name: Install Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --silent --no-audit --no-fund playwright @axe-core/playwright
          npx playwright install chromium >/dev/null 2>&1
      - name: Prepare diagnostics
        run: |
          cat > /tmp/diagnose.mjs <<'JS'
          import {chromium} from 'playwright';
          import AxeBuilder from '@axe-core/playwright';
          import {spawn} from 'node:child_process';
          const group=process.env.GROUP;
          const server=spawn('python3',['-m','http.server','8765','--bind','127.0.0.1'],{stdio:'ignore'});
          await new Promise(r=>setTimeout(r,600));
          const browser=await chromium.launch({headless:true});
          const page=await browser.newPage({viewport:{width:360,height:800}});
          const runtime=[];page.on('console',m=>{if(m.type()==='error')runtime.push(m.text())});page.on('pageerror',e=>runtime.push(String(e)));page.on('requestfailed',r=>runtime.push('request '+r.url()));
          const res=await page.goto('http://127.0.0.1:8765/premium-v14/',{waitUntil:'networkidle'});
          const ok=(v,m)=>{if(!v)throw new Error(m)};
          if(group==='basic'){ok(res?.status()===200,'http '+res?.status());ok(runtime.length===0,'runtime '+runtime.join(';'));const broken=await page.evaluate(()=>[...document.images].filter(x=>!x.complete||!x.naturalWidth).map(x=>x.src));ok(!broken.length,'broken '+broken.join(','));}
          if(group==='overflow'){const d=await page.evaluate(()=>({v:innerWidth,d:document.documentElement.scrollWidth,b:document.body.scrollWidth}));ok(d.d<=d.v+1&&d.b<=d.v+1,'overflow '+JSON.stringify(d));}
          if(group==='slider'){await page.locator('[data-state="before"]').click();let s=await page.locator('#beforeAfter').evaluate(e=>parseFloat(getComputedStyle(e).getPropertyValue('--split')));ok(s>=99,'before '+s);await page.locator('[data-state="after"]').click();s=await page.locator('#beforeAfter').evaluate(e=>parseFloat(getComputedStyle(e).getPropertyValue('--split')));ok(s<=1,'after '+s);ok((await page.locator('#splitHandle').getAttribute('role'))==='slider','role');}
          if(group==='scenario'){ok((await page.locator('#decisionMoney').innerText()).includes('96 000'),'default '+await page.locator('#decisionMoney').innerText());await page.locator('[data-mode="replace"]').click();await page.waitForTimeout(650);ok((await page.locator('#decisionMoney').innerText()).includes('312 000'),'replace '+await page.locator('#decisionMoney').innerText());}
          if(group==='calculator'){const vals=await page.evaluate(()=>[document.querySelector('#replacementRange')?.textContent,document.querySelector('#restorationRange')?.textContent,document.querySelector('#savingMoney')?.textContent]);ok(!vals.some(v=>!v||v.includes('—')||v.includes('NaN')),'default '+JSON.stringify(vals));await page.locator('input[name="known"]').fill('10000');await page.locator('input[name="known"]').dispatchEvent('input');ok((await page.locator('#savingBlock').getAttribute('class')).includes('negative'),'negative '+await page.locator('#savingBlock').getAttribute('class'));}
          if(group==='counter'){await page.evaluate(()=>window.scrollTo(0,document.querySelector('#economics').offsetTop+document.querySelector('#economics').offsetHeight));await page.waitForTimeout(900);const value=await page.locator('#lossMoney').innerText();ok(value.includes('312 000'),'counter '+value);}
          if(group==='mobile'){await page.locator('#calculator').scrollIntoViewIfNeeded();await page.locator('input[name="area"]').focus();await page.waitForTimeout(200);ok(await page.locator('#mobileCta').evaluate(e=>e.classList.contains('keyboard')),'keyboard class');}
          if(group==='axe'){const axe=await new AxeBuilder({page}).disableRules(['color-contrast']).analyze();const serious=axe.violations.filter(v=>['serious','critical'].includes(v.impact));ok(!serious.length,'axe '+serious.map(v=>v.id+':'+v.nodes.length).join(','));}
          await browser.close();server.kill('SIGTERM');console.log('PASS '+group);
          JS
      - name: Basic loading and images
        if: always()
        env: {GROUP: basic}
        run: node /tmp/diagnose.mjs
      - name: Mobile horizontal overflow
        if: always()
        env: {GROUP: overflow}
        run: node /tmp/diagnose.mjs
      - name: Before and after controls
        if: always()
        env: {GROUP: slider}
        run: node /tmp/diagnose.mjs
      - name: Scenario switch
        if: always()
        env: {GROUP: scenario}
        run: node /tmp/diagnose.mjs
      - name: Calculator states
        if: always()
        env: {GROUP: calculator}
        run: node /tmp/diagnose.mjs
      - name: Replacement cost counter
        if: always()
        env: {GROUP: counter}
        run: node /tmp/diagnose.mjs
      - name: Mobile keyboard CTA
        if: always()
        env: {GROUP: mobile}
        run: node /tmp/diagnose.mjs
      - name: Serious accessibility issues
        if: always()
        env: {GROUP: axe}
        run: node /tmp/diagnose.mjs
