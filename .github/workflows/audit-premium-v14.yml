name: Audit premium v14

on:
  push:
    branches: [main]
    paths:
      - 'premium-v14/**'
      - '.github/scripts/audit-premium-v14.mjs'
      - '.github/workflows/audit-premium-v14.yml'

permissions:
  contents: read

jobs:
  browser-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install browser audit tools
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.52.0 @axe-core/playwright@4.10.2
          npx playwright install --with-deps chromium
      - name: Start local site
        run: |
          python3 -m http.server 8080 >/tmp/premium-v14-server.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:8080/premium-v14/ >/dev/null && exit 0; sleep 1; done
          cat /tmp/premium-v14-server.log
          exit 1
      - name: Run viewport and interaction audit
        run: node .github/scripts/audit-premium-v14.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: premium-v14-audit-screenshots
          path: audit-output
          if-no-files-found: ignore
