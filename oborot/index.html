<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#090908"><title>ОБОРОТ — система роста выручки автосервиса</title><style>html,body{margin:0;background:#090908;color:#f4efe6}body{min-height:100vh;display:grid;place-items:center;font-family:system-ui}.loader{display:flex;gap:14px;align-items:center;text-transform:uppercase;letter-spacing:.2em;font-size:11px}.ring{width:28px;height:28px;border-radius:50%;border:1px solid #5d4c34;border-top-color:#dfc38b;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="loader"><i class="ring"></i>ОБОРОТ · запуск системы</div><script type="module">try{const p=['./assets/chunk-00.txt','./assets/chunk-01.txt','./assets/chunk-02.txt','./assets/chunk-03.txt','./assets/chunk-04.txt','./assets/chunk-05.txt'];const t=(await Promise.all(p.map(async x=>{const r=await fetch(x);if(!r.ok)throw Error(r.status);return r.text()}))).join('');const b=atob(t.trim()),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);const h=await new Response(new Blob([u]).stream().pipeThrough(new DecompressionStream('gzip'))).text();document.open();document.write(h);document.close()}catch(e){console.error(e);document.body.innerHTML='<main style="padding:32px;text-align:center"><h1>Не удалось загрузить сайт</h1><p>Обновите страницу или откройте её в актуальном браузере.</p><a style="color:#dfc38b" href="https://t.me/zhukov_boss">Написать в Telegram</a></main>'}</script></body></html>
